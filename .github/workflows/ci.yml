name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    name: Type Check, Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Type check (tsc --noEmit)
      run: npx tsc --noEmit
      env:
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        JWT_SECRET: ci-test-secret
        GROQ_API_KEY: dummy-key
        EVOLUTION_API_URL: https://dummy.example.com
        EVOLUTION_API_KEY: dummy-key
        NEXT_PUBLIC_APP_URL: http://localhost:3000

    - name: Test (jest)
      # Sem --coverage de proposito: o threshold global (50%) ainda nao foi
      # atingido enquanto a cobertura de rota sobe. O gate falha por TESTE
      # quebrado (regressao), nao por cobertura — evita travar PRs cedo demais.
      # Quando a cobertura passar dos 50%, trocar por `npm run test:coverage -- --ci`.
      run: npm test -- --ci
      env:
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        JWT_SECRET: ci-test-secret
        GROQ_API_KEY: dummy-key
        EVOLUTION_API_URL: https://dummy.example.com
        EVOLUTION_API_KEY: dummy-key
        NEXT_PUBLIC_APP_URL: http://localhost:3000

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Build
      run: npm run build
      env:
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        JWT_SECRET: ci-test-secret
        GROQ_API_KEY: dummy-key
        EVOLUTION_API_URL: https://dummy.example.com
        EVOLUTION_API_KEY: dummy-key
        NEXT_PUBLIC_APP_URL: http://localhost:3000

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: build-${{ github.sha }}
        path: .next
        retention-days: 7
